<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d7ec5"/>
      <stop offset="50%" stop-color="#4db5e8"/>
      <stop offset="100%" stop-color="#a2d5f0"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#e8e2da"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#5aaccc"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5aa84a"/>
      <stop offset="100%" stop-color="#4a8a3a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="300" cy="60" rx="100" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="340" cy="55" rx="70" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="650" cy="90" rx="80" ry="25" fill="white" opacity="0.5"/>
  <!-- Main building - Two-story medical centre -->
  <rect x="120" y="200" width="560" height="280" fill="url(#bldg)" rx="4"/>
  <!-- Building top accent -->
  <rect x="120" y="195" width="560" height="12" fill="#2196F3" rx="2"/>
  <!-- Second floor windows -->
  <g fill="url(#glass)" stroke="#6a9ab5" stroke-width="1.5">
    <rect x="150" y="225" width="70" height="55" rx="2"/>
    <rect x="240" y="225" width="70" height="55" rx="2"/>
    <rect x="330" y="225" width="70" height="55" rx="2"/>
    <rect x="420" y="225" width="70" height="55" rx="2"/>
    <rect x="510" y="225" width="70" height="55" rx="2"/>
    <rect x="600" y="225" width="60" height="55" rx="2"/>
  </g>
  <!-- Floor divider -->
  <rect x="120" y="295" width="560" height="5" fill="#c8c0b4"/>
  <!-- First floor - larger windows -->
  <g fill="url(#glass)" stroke="#6a9ab5" stroke-width="1.5">
    <rect x="150" y="315" width="100" height="80" rx="2"/>
    <rect x="270" y="315" width="100" height="80" rx="2"/>
    <rect x="500" y="315" width="80" height="80" rx="2"/>
    <rect x="600" y="315" width="60" height="80" rx="2"/>
  </g>
  <!-- Main entrance -->
  <rect x="390" y="310" width="90" height="170" fill="#d0e8f5" rx="3"/>
  <rect x="390" y="310" width="90" height="170" fill="none" stroke="#4a8aaa" stroke-width="2" rx="3"/>
  <rect x="400" y="350" width="30" height="130" fill="#5aaccc" rx="1"/>
  <rect x="440" y="350" width="30" height="130" fill="#5aaccc" rx="1"/>
  <circle cx="427" cy="415" r="3" fill="#ccc"/>
  <circle cx="443" cy="415" r="3" fill="#ccc"/>
  <!-- Entrance canopy -->
  <rect x="370" y="300" width="130" height="12" fill="#2196F3" rx="2"/>
  <!-- Medical cross sign -->
  <rect x="405" y="305" width="60" height="20" fill="white" rx="2" stroke="#2196F3" stroke-width="1"/>
  <rect x="428" y="308" width="4" height="14" fill="#e53935"/>
  <rect x="422" y="312" width="16" height="4" fill="#e53935"/>
  <!-- Company signage -->
  <rect x="200" y="160" width="400" height="30" fill="rgba(33,150,243,0.9)" rx="4"/>
  <text x="400" y="182" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">MEDICAL CENTRE</text>
  <!-- Ground -->
  <rect x="0" y="480" width="800" height="120" fill="url(#grass)"/>
  <!-- Pathway -->
  <rect x="380" y="480" width="110" height="120" fill="#c8c0b0"/>
  <!-- Garden beds -->
  <ellipse cx="200" cy="475" rx="60" ry="15" fill="#3a8a3a"/>
  <ellipse cx="190" cy="470" rx="30" ry="20" fill="#45a050"/>
  <ellipse cx="210" cy="472" rx="25" ry="18" fill="#3d9545"/>
  <!-- Flowers -->
  <circle cx="180" cy="462" r="4" fill="#e91e63"/>
  <circle cx="200" cy="458" r="4" fill="#ff9800"/>
  <circle cx="220" cy="460" r="4" fill="#e91e63"/>
  <ellipse cx="600" cy="475" rx="60" ry="15" fill="#3a8a3a"/>
  <ellipse cx="590" cy="470" rx="30" ry="20" fill="#45a050"/>
  <ellipse cx="610" cy="472" rx="25" ry="18" fill="#3d9545"/>
  <circle cx="580" cy="462" r="4" fill="#ff9800"/>
  <circle cx="600" cy="458" r="4" fill="#e91e63"/>
  <circle cx="620" cy="460" r="4" fill="#ff9800"/>
  <!-- Trees -->
  <rect x="100" y="430" width="10" height="50" fill="#5a3a1a"/>
  <ellipse cx="105" cy="415" rx="30" ry="30" fill="#2d7a3e"/>
  <ellipse cx="100" cy="420" rx="22" ry="22" fill="#35903e"/>
  <rect x="690" y="430" width="10" height="50" fill="#5a3a1a"/>
  <ellipse cx="695" cy="415" rx="30" ry="30" fill="#2d7a3e"/>
  <ellipse cx="700" cy="420" rx="22" ry="22" fill="#35903e"/>
  <!-- Handicap parking sign -->
  <rect x="300" y="510" width="30" height="30" fill="#2196F3" rx="2"/>
  <text x="315" y="532" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">♿</text>
  <!-- Text overlay -->
  <rect x="0" y="530" width="800" height="70" fill="rgba(0,30,60,0.7)"/>
  <text x="400" y="565" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Medical Centre — Perth</text>
  <text x="400" y="590" text-anchor="middle" fill="#a2d5f0" font-family="Arial, sans-serif" font-size="14">Professional Healthcare Facility</text>
</svg>
