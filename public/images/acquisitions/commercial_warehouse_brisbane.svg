<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="60%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0dcd6"/>
      <stop offset="100%" stop-color="#c8c4be"/>
    </linearGradient>
    <linearGradient id="metalRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#757575"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="650" cy="80" rx="90" ry="30" fill="white" opacity="0.6"/>
  <ellipse cx="690" cy="75" rx="65" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="150" cy="110" rx="70" ry="22" fill="white" opacity="0.5"/>
  <!-- Main warehouse building -->
  <rect x="50" y="200" width="700" height="260" fill="url(#wall)"/>
  <!-- Metal roof -->
  <polygon points="40,200 400,130 760,200" fill="url(#metalRoof)"/>
  <line x1="40" y1="200" x2="760" y2="200" stroke="#616161" stroke-width="2"/>
  <!-- Roof ridges -->
  <g stroke="#8a8a8a" stroke-width="1" opacity="0.5">
    <line x1="100" y1="192" x2="100" y2="200"/>
    <line x1="200" y1="175" x2="200" y2="200"/>
    <line x1="300" y1="158" x2="300" y2="200"/>
    <line x1="400" y1="150" x2="400" y2="200"/>
    <line x1="500" y1="158" x2="500" y2="200"/>
    <line x1="600" y1="175" x2="600" y2="200"/>
    <line x1="700" y1="192" x2="700" y2="200"/>
  </g>
  <!-- Loading docks -->
  <rect x="80" y="280" width="150" height="180" fill="#616161" rx="3"/>
  <rect x="90" y="290" width="130" height="120" fill="#424242"/>
  <!-- Roller door lines -->
  <g stroke="#555" stroke-width="1" opacity="0.6">
    <line x1="90" y1="305" x2="220" y2="305"/>
    <line x1="90" y1="320" x2="220" y2="320"/>
    <line x1="90" y1="335" x2="220" y2="335"/>
    <line x1="90" y1="350" x2="220" y2="350"/>
    <line x1="90" y1="365" x2="220" y2="365"/>
    <line x1="90" y1="380" x2="220" y2="380"/>
    <line x1="90" y1="395" x2="220" y2="395"/>
  </g>
  <rect x="280" y="280" width="150" height="180" fill="#616161" rx="3"/>
  <rect x="290" y="290" width="130" height="120" fill="#424242"/>
  <g stroke="#555" stroke-width="1" opacity="0.6">
    <line x1="290" y1="305" x2="420" y2="305"/>
    <line x1="290" y1="320" x2="420" y2="320"/>
    <line x1="290" y1="335" x2="420" y2="335"/>
    <line x1="290" y1="350" x2="420" y2="350"/>
    <line x1="290" y1="365" x2="420" y2="365"/>
    <line x1="290" y1="380" x2="420" y2="380"/>
    <line x1="290" y1="395" x2="420" y2="395"/>
  </g>
  <rect x="480" y="280" width="150" height="180" fill="#616161" rx="3"/>
  <rect x="490" y="290" width="130" height="120" fill="#424242"/>
  <g stroke="#555" stroke-width="1" opacity="0.6">
    <line x1="490" y1="305" x2="620" y2="305"/>
    <line x1="490" y1="320" x2="620" y2="320"/>
    <line x1="490" y1="335" x2="620" y2="335"/>
    <line x1="490" y1="350" x2="620" y2="350"/>
    <line x1="490" y1="365" x2="620" y2="365"/>
    <line x1="490" y1="380" x2="620" y2="380"/>
    <line x1="490" y1="395" x2="620" y2="395"/>
  </g>
  <!-- Loading dock platforms -->
  <rect x="80" y="420" width="150" height="40" fill="#8a8a7a"/>
  <rect x="280" y="420" width="150" height="40" fill="#8a8a7a"/>
  <rect x="480" y="420" width="150" height="40" fill="#8a8a7a"/>
  <!-- Office section on right -->
  <rect x="660" y="220" width="80" height="240" fill="#d0ccc6"/>
  <rect x="670" y="235" width="25" height="35" fill="#7ec8e3" stroke="#5a5a5a" stroke-width="1"/>
  <rect x="705" y="235" width="25" height="35" fill="#7ec8e3" stroke="#5a5a5a" stroke-width="1"/>
  <rect x="670" y="290" width="25" height="35" fill="#7ec8e3" stroke="#5a5a5a" stroke-width="1"/>
  <rect x="705" y="290" width="25" height="35" fill="#7ec8e3" stroke="#5a5a5a" stroke-width="1"/>
  <rect x="680" y="380" width="40" height="80" fill="#4a6a7a" rx="2"/>
  <!-- Ground / Concrete apron -->
  <rect x="0" y="460" width="800" height="140" fill="#a0a098"/>
  <!-- Road markings -->
  <g stroke="#e0e000" stroke-width="3" stroke-dasharray="20,15">
    <line x1="50" y1="510" x2="750" y2="510"/>
  </g>
  <!-- Truck -->
  <rect x="500" y="465" width="120" height="40" fill="white" rx="2"/>
  <rect x="620" y="470" width="40" height="35" fill="#3a5a7a" rx="2"/>
  <circle cx="530" cy="510" r="10" fill="#333"/>
  <circle cx="590" cy="510" r="10" fill="#333"/>
  <circle cx="640" cy="510" r="10" fill="#333"/>
  <!-- Company sign -->
  <rect x="300" y="210" width="200" height="30" fill="#1a3a5a" rx="3"/>
  <text x="400" y="232" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">LOGISTICS HUB</text>
  <!-- Text overlay -->
  <rect x="0" y="530" width="800" height="70" fill="rgba(0,30,60,0.7)"/>
  <text x="400" y="565" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Industrial Warehouse — Brisbane</text>
  <text x="400" y="590" text-anchor="middle" fill="#90CAF9" font-family="Arial, sans-serif" font-size="14">Logistics &amp; Distribution Facility</text>
</svg>
