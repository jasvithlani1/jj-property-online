<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="70%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="facade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#d4ccc0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ec8e8"/>
      <stop offset="100%" stop-color="#5aa8d0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="70" rx="100" ry="35" fill="white" opacity="0.7"/>
  <ellipse cx="240" cy="65" rx="70" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="100" rx="85" ry="30" fill="white" opacity="0.6"/>
  <!-- Main retail building -->
  <rect x="80" y="180" width="640" height="300" fill="url(#facade)" rx="3"/>
  <!-- Upper facade accent -->
  <rect x="80" y="180" width="640" height="15" fill="#8a7e6e"/>
  <!-- Large glass storefront windows -->
  <rect x="100" y="300" width="150" height="160" fill="url(#glass)" rx="2"/>
  <rect x="270" y="300" width="120" height="160" fill="url(#glass)" rx="2"/>
  <rect x="410" y="300" width="120" height="160" fill="url(#glass)" rx="2"/>
  <rect x="550" y="300" width="150" height="160" fill="url(#glass)" rx="2"/>
  <!-- Window frames -->
  <rect x="100" y="300" width="150" height="160" fill="none" stroke="#5a5a5a" stroke-width="2" rx="2"/>
  <rect x="270" y="300" width="120" height="160" fill="none" stroke="#5a5a5a" stroke-width="2" rx="2"/>
  <rect x="410" y="300" width="120" height="160" fill="none" stroke="#5a5a5a" stroke-width="2" rx="2"/>
  <rect x="550" y="300" width="150" height="160" fill="none" stroke="#5a5a5a" stroke-width="2" rx="2"/>
  <!-- Window mullions -->
  <line x1="175" y1="300" x2="175" y2="460" stroke="#5a5a5a" stroke-width="1.5" opacity="0.5"/>
  <line x1="625" y1="300" x2="625" y2="460" stroke="#5a5a5a" stroke-width="1.5" opacity="0.5"/>
  <!-- Upper windows -->
  <g fill="url(#glass)" stroke="#5a5a5a" stroke-width="1.5">
    <rect x="110" y="210" width="80" height="70" rx="2"/>
    <rect x="210" y="210" width="80" height="70" rx="2"/>
    <rect x="310" y="210" width="80" height="70" rx="2"/>
    <rect x="410" y="210" width="80" height="70" rx="2"/>
    <rect x="510" y="210" width="80" height="70" rx="2"/>
    <rect x="610" y="210" width="80" height="70" rx="2"/>
  </g>
  <!-- Entrance canopy -->
  <rect x="300" y="285" width="200" height="10" fill="#6a5e4e" rx="2"/>
  <rect x="310" y="295" width="180" height="5" fill="#5a4e3e" opacity="0.5"/>
  <!-- Main entrance doors -->
  <rect x="350" y="380" width="45" height="80" fill="#3a7aa8" rx="1"/>
  <rect x="405" y="380" width="45" height="80" fill="#3a7aa8" rx="1"/>
  <circle cx="392" cy="420" r="3" fill="#d0d0d0"/>
  <circle cx="408" cy="420" r="3" fill="#d0d0d0"/>
  <!-- Store signage areas -->
  <rect x="110" y="290" width="120" height="15" fill="#2c3e50" rx="2"/>
  <text x="170" y="302" text-anchor="middle" fill="white" font-family="Arial" font-size="10">BOUTIQUE</text>
  <rect x="560" y="290" width="120" height="15" fill="#2c3e50" rx="2"/>
  <text x="620" y="302" text-anchor="middle" fill="white" font-family="Arial" font-size="10">LIFESTYLE</text>
  <!-- Landscaping -->
  <rect x="0" y="480" width="800" height="120" fill="#7a8a6a"/>
  <rect x="0" y="478" width="800" height="8" fill="#a0a0a0"/>
  <!-- Planters -->
  <rect x="130" y="455" width="40" height="25" fill="#5a4a3a" rx="3"/>
  <ellipse cx="150" cy="445" rx="25" ry="20" fill="#3a8a4a"/>
  <ellipse cx="145" cy="440" rx="18" ry="15" fill="#45a055"/>
  <rect x="630" y="455" width="40" height="25" fill="#5a4a3a" rx="3"/>
  <ellipse cx="650" cy="445" rx="25" ry="20" fill="#3a8a4a"/>
  <ellipse cx="655" cy="440" rx="18" ry="15" fill="#45a055"/>
  <!-- Parking lot lines -->
  <g stroke="white" stroke-width="2" opacity="0.5">
    <line x1="100" y1="520" x2="100" y2="560"/>
    <line x1="160" y1="520" x2="160" y2="560"/>
    <line x1="220" y1="520" x2="220" y2="560"/>
    <line x1="580" y1="520" x2="580" y2="560"/>
    <line x1="640" y1="520" x2="640" y2="560"/>
    <line x1="700" y1="520" x2="700" y2="560"/>
  </g>
  <!-- Text overlay -->
  <rect x="0" y="530" width="800" height="70" fill="rgba(0,30,60,0.7)"/>
  <text x="400" y="565" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Premium Retail — Melbourne</text>
  <text x="400" y="590" text-anchor="middle" fill="#BBDEFB" font-family="Arial, sans-serif" font-size="14">Shopping Centre Investment</text>
</svg>
