<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a8fcb"/>
      <stop offset="60%" stop-color="#5db8e8"/>
      <stop offset="100%" stop-color="#a8daf0"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="50%" stop-color="#4fa8c9"/>
      <stop offset="100%" stop-color="#3a8db5"/>
    </linearGradient>
    <linearGradient id="glass2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89cfe8"/>
      <stop offset="50%" stop-color="#5ab3d4"/>
      <stop offset="100%" stop-color="#4098b8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8c8c8c"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="80" ry="30" fill="white" opacity="0.6"/>
  <ellipse cx="180" cy="75" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="620" cy="120" rx="90" ry="28" fill="white" opacity="0.5"/>
  <ellipse cx="660" cy="115" rx="65" ry="22" fill="white" opacity="0.6"/>
  <!-- Background buildings -->
  <rect x="50" y="200" width="80" height="300" fill="#6b7d8e" opacity="0.5"/>
  <rect x="140" y="250" width="60" height="250" fill="#5a6d7e" opacity="0.5"/>
  <rect x="580" y="220" width="70" height="280" fill="#6b7d8e" opacity="0.5"/>
  <rect x="660" y="180" width="90" height="320" fill="#5a6d7e" opacity="0.5"/>
  <!-- Main building - Modern glass tower -->
  <rect x="250" y="80" width="300" height="420" fill="url(#glass1)" rx="2"/>
  <!-- Building frame -->
  <rect x="248" y="78" width="304" height="424" fill="none" stroke="#2c5f7a" stroke-width="3" rx="2"/>
  <!-- Glass panels - rows -->
  <g opacity="0.4" stroke="#2c5f7a" stroke-width="1">
    <line x1="250" y1="110" x2="550" y2="110"/>
    <line x1="250" y1="140" x2="550" y2="140"/>
    <line x1="250" y1="170" x2="550" y2="170"/>
    <line x1="250" y1="200" x2="550" y2="200"/>
    <line x1="250" y1="230" x2="550" y2="230"/>
    <line x1="250" y1="260" x2="550" y2="260"/>
    <line x1="250" y1="290" x2="550" y2="290"/>
    <line x1="250" y1="320" x2="550" y2="320"/>
    <line x1="250" y1="350" x2="550" y2="350"/>
    <line x1="250" y1="380" x2="550" y2="380"/>
    <line x1="250" y1="410" x2="550" y2="410"/>
    <line x1="250" y1="440" x2="550" y2="440"/>
    <line x1="250" y1="470" x2="550" y2="470"/>
  </g>
  <!-- Glass panels - columns -->
  <g opacity="0.4" stroke="#2c5f7a" stroke-width="1">
    <line x1="310" y1="80" x2="310" y2="500"/>
    <line x1="370" y1="80" x2="370" y2="500"/>
    <line x1="430" y1="80" x2="430" y2="500"/>
    <line x1="490" y1="80" x2="490" y2="500"/>
  </g>
  <!-- Reflections on glass -->
  <rect x="255" y="85" width="50" height="410" fill="white" opacity="0.08"/>
  <rect x="315" y="85" width="25" height="410" fill="white" opacity="0.05"/>
  <rect x="435" y="85" width="50" height="410" fill="white" opacity="0.06"/>
  <!-- Ground / Street level -->
  <rect x="0" y="500" width="800" height="100" fill="url(#ground)"/>
  <!-- Entrance -->
  <rect x="350" y="460" width="100" height="40" fill="#1a3a4a" rx="2"/>
  <rect x="370" y="465" width="25" height="35" fill="#5db8e8" opacity="0.5"/>
  <rect x="405" y="465" width="25" height="35" fill="#5db8e8" opacity="0.5"/>
  <!-- Trees -->
  <rect x="220" y="460" width="8" height="40" fill="#5a3a1a"/>
  <ellipse cx="224" cy="445" rx="20" ry="25" fill="#2d8a4e"/>
  <ellipse cx="218" cy="450" rx="15" ry="20" fill="#35a05a"/>
  <rect x="570" y="460" width="8" height="40" fill="#5a3a1a"/>
  <ellipse cx="574" cy="445" rx="20" ry="25" fill="#2d8a4e"/>
  <ellipse cx="580" cy="450" rx="15" ry="20" fill="#35a05a"/>
  <!-- Sidewalk -->
  <rect x="0" y="500" width="800" height="8" fill="#b0b0b0"/>
  <!-- Text overlay area -->
  <rect x="0" y="530" width="800" height="70" fill="rgba(0,30,60,0.7)"/>
  <text x="400" y="565" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Commercial Office — Sydney CBD</text>
  <text x="400" y="590" text-anchor="middle" fill="#a8daf0" font-family="Arial, sans-serif" font-size="14">Premium Grade A Office Space</text>
</svg>
