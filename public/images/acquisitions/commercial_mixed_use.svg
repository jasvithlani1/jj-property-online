<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="100%" stop-color="#d8d4ce"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80d0f0"/>
      <stop offset="100%" stop-color="#4aa8d0"/>
    </linearGradient>
    <linearGradient id="shopfront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8961a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="180" cy="80" rx="90" ry="30" fill="white" opacity="0.6"/>
  <ellipse cx="210" cy="75" rx="60" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="580" cy="60" rx="75" ry="25" fill="white" opacity="0.5"/>
  <!-- Left building - taller office portion -->
  <rect x="100" y="120" width="280" height="380" fill="url(#bldg2)" rx="3"/>
  <!-- Right building portion -->
  <rect x="380" y="180" width="320" height="320" fill="url(#bldg1)" rx="3"/>
  <!-- Left building windows (offices) -->
  <g fill="url(#glass)" stroke="#4a6a7a" stroke-width="1">
    <!-- Row 1 -->
    <rect x="120" y="145" width="55" height="40" rx="1"/>
    <rect x="190" y="145" width="55" height="40" rx="1"/>
    <rect x="260" y="145" width="55" height="40" rx="1"/>
    <rect x="330" y="145" width="35" height="40" rx="1"/>
    <!-- Row 2 -->
    <rect x="120" y="200" width="55" height="40" rx="1"/>
    <rect x="190" y="200" width="55" height="40" rx="1"/>
    <rect x="260" y="200" width="55" height="40" rx="1"/>
    <rect x="330" y="200" width="35" height="40" rx="1"/>
    <!-- Row 3 -->
    <rect x="120" y="255" width="55" height="40" rx="1"/>
    <rect x="190" y="255" width="55" height="40" rx="1"/>
    <rect x="260" y="255" width="55" height="40" rx="1"/>
    <rect x="330" y="255" width="35" height="40" rx="1"/>
    <!-- Row 4 -->
    <rect x="120" y="310" width="55" height="40" rx="1"/>
    <rect x="190" y="310" width="55" height="40" rx="1"/>
    <rect x="260" y="310" width="55" height="40" rx="1"/>
    <rect x="330" y="310" width="35" height="40" rx="1"/>
  </g>
  <!-- Right building windows (offices upper) -->
  <g fill="url(#glass)" stroke="#6a8a9a" stroke-width="1">
    <rect x="400" y="200" width="60" height="45" rx="1"/>
    <rect x="475" y="200" width="60" height="45" rx="1"/>
    <rect x="550" y="200" width="60" height="45" rx="1"/>
    <rect x="625" y="200" width="55" height="45" rx="1"/>
    <rect x="400" y="260" width="60" height="45" rx="1"/>
    <rect x="475" y="260" width="60" height="45" rx="1"/>
    <rect x="550" y="260" width="60" height="45" rx="1"/>
    <rect x="625" y="260" width="55" height="45" rx="1"/>
    <rect x="400" y="320" width="60" height="45" rx="1"/>
    <rect x="475" y="320" width="60" height="45" rx="1"/>
    <rect x="550" y="320" width="60" height="45" rx="1"/>
    <rect x="625" y="320" width="55" height="45" rx="1"/>
  </g>
  <!-- Ground floor retail section -->
  <rect x="100" y="395" width="600" height="105" fill="#3a3a3a"/>
  <!-- Retail divider -->
  <rect x="100" y="385" width="600" height="12" fill="url(#shopfront)" rx="1"/>
  <!-- Shop 1 -->
  <rect x="115" y="410" width="120" height="80" fill="#e8f0f8" rx="2"/>
  <rect x="115" y="410" width="120" height="80" fill="none" stroke="#555" stroke-width="1.5" rx="2"/>
  <rect x="120" y="398" width="80" height="14" fill="#e53935" rx="2"/>
  <text x="160" y="409" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">CAFE</text>
  <!-- Shop 2 -->
  <rect x="255" y="410" width="100" height="80" fill="#e8f0f8" rx="2"/>
  <rect x="255" y="410" width="100" height="80" fill="none" stroke="#555" stroke-width="1.5" rx="2"/>
  <rect x="260" y="398" width="80" height="14" fill="#1565C0" rx="2"/>
  <text x="300" y="409" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">PHARMACY</text>
  <!-- Entrance -->
  <rect x="375" y="405" width="60" height="95" fill="#5aaccc" rx="2"/>
  <rect x="375" y="405" width="60" height="95" fill="none" stroke="#4a8aaa" stroke-width="2" rx="2"/>
  <line x1="405" y1="405" x2="405" y2="500" stroke="#4a8aaa" stroke-width="1.5"/>
  <!-- Shop 3 -->
  <rect x="455" y="410" width="100" height="80" fill="#e8f0f8" rx="2"/>
  <rect x="455" y="410" width="100" height="80" fill="none" stroke="#555" stroke-width="1.5" rx="2"/>
  <rect x="460" y="398" width="80" height="14" fill="#2e7d32" rx="2"/>
  <text x="500" y="409" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">FRESH MART</text>
  <!-- Shop 4 -->
  <rect x="575" y="410" width="110" height="80" fill="#e8f0f8" rx="2"/>
  <rect x="575" y="410" width="110" height="80" fill="none" stroke="#555" stroke-width="1.5" rx="2"/>
  <rect x="580" y="398" width="90" height="14" fill="#6a1b9a" rx="2"/>
  <text x="625" y="409" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">BOUTIQUE</text>
  <!-- Street level -->
  <rect x="0" y="500" width="800" height="100" fill="#888880"/>
  <rect x="0" y="498" width="800" height="6" fill="#a0a098"/>
  <!-- Sidewalk features -->
  <rect x="80" y="505" width="8" height="30" fill="#555"/>
  <ellipse cx="84" cy="500" rx="15" ry="18" fill="#3a8a4a"/>
  <rect x="710" y="505" width="8" height="30" fill="#555"/>
  <ellipse cx="714" cy="500" rx="15" ry="18" fill="#3a8a4a"/>
  <!-- Road -->
  <rect x="0" y="540" width="800" height="60" fill="#555550"/>
  <line x1="0" y1="570" x2="800" y2="570" stroke="white" stroke-width="2" stroke-dasharray="30,20"/>
  <!-- Text overlay -->
  <rect x="0" y="530" width="800" height="70" fill="rgba(0,30,60,0.7)"/>
  <text x="400" y="565" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Mixed-Use Development — Australia</text>
  <text x="400" y="590" text-anchor="middle" fill="#BBDEFB" font-family="Arial, sans-serif" font-size="14">Retail &amp; Commercial Offices</text>
</svg>
